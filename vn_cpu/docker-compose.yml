version: '3.8'

services:
  vn-cpu-core:
    build: .
    container_name: vn_cpu_v04_lean
    restart: always
    volumes:
      - .:/app/vn_cpu
      - ..:/app
      - /home/mayutama/shii-chan-mcp:/app/shii-chan-mcp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    # Strict isolation
    cpu_shares: 256
    mem_limit: 512m
    command: python3 /app/vn_cpu/organism.py --mode all --daemon
